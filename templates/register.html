{% extends 'base.html' %}

{% block content %}

<div class="auth-container">
  <div class="auth-card">

    <h2>Join DesiSkill</h2>
    <p class="auth-subtitle">Create your free account</p>

    {% if error %}
    <div class="alert-error">{{ error }}</div>
    {% endif %}

    <form method="POST" action="/register">

      <div class="form-group">
        <label>Full Name</label>
        <input type="text" name="name" placeholder="Utkarsh Agrawal" required>
      </div>

      <div class="form-group">
        <label>Email</label>
        <input type="email" name="email" placeholder="utkarsh@college.edu" required>
      </div>

      <div class="form-group">
        <label>Password</label>
        <input type="password" name="password" placeholder="Min 6 characters" required>
      </div>

      <div class="form-group">
        <label>College Name</label>
        <input type="text" name="college" placeholder="e.g. IIT Delhi" required>
      </div>

      <button type="submit" class="btn-auth">Create Account</button>

    </form>

    <p class="auth-switch">
      Already have an account? <a href="/login">Login here</a>
    </p>

  </div>
</div>

{% endblock %}
