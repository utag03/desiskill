{% extends 'base.html' %}

{% block content %}
<div style="max-width:800px;margin:0 auto;padding:40px 20px">

  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:24px">
    <div>
      <h1 style="font-size:24px;color:#1a1a2e;margin-bottom:4px">Chat</h1>
      <p style="color:#888;font-size:14px">Chatting with <strong>{{ other_user }}</strong></p>
    </div>
    <a href="/matches" class="btn-small">Back to Matches</a>
  </div>

  <div id="chat-box" style="background:white;border:1px solid #ececff;border-radius:12px;padding:20px;height:400px;overflow-y:auto;margin-bottom:16px">
    {% for msg in messages %}
      {% if msg.sender == session.user_name %}
        <div style="margin-bottom:12px;text-align:right">
          <div style="display:inline-block;max-width:70%;padding:10px 14px;border-radius:12px;border-bottom-right-radius:2px;font-size:14px;background:#6c63ff;color:white">
            {{ msg.message }}
          </div>
          <div style="font-size:11px;color:#aaa;margin-top:3px">{{ msg.sent_at }}</div>
        </div>
      {% else %}
        <div style="margin-bottom:12px;text-align:left">
          <div style="display:inline-block;max-width:70%;padding:10px 14px;border-radius:12px;border-bottom-left-radius:2px;font-size:14px;background:#f0eeff;color:#1a1a2e">
            {{ msg.message }}
          </div>
          <div style="font-size:11px;color:#aaa;margin-top:3px">{{ msg.sent_at }}</div>
        </div>
      {% endif %}
    {% endfor %}
    <div id="chat-end"></div>
  </div>

  <div style="display:flex;gap:10px">
    <input id="msg-input" type="text"
      placeholder="Type a message..."
      style="flex:1;padding:12px 16px;border:1.5px solid #ddd;border-radius:8px;font-size:14px;outline:none"
      onkeydown="if(event.key==='Enter') sendMessage()">
    <button onclick="sendMessage()" class="btn-primary" style="padding:12px 24px">Send</button>
  </div>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.7.2/socket.io.min.js"></script>
<script>
  const socket = io();
  const room   = "{{ room_id }}";
  const sender = "{{ session.user_name }}";

  socket.emit('join', {room: room});

  socket.on('receive_message', function(data) {
    const box = document.getElementById('chat-box');
    const isMe = data.sender === sender;
    const div = document.createElement('div');
    div.style.marginBottom = '12px';
    div.style.textAlign = isMe ? 'right' : 'left';
    div.innerHTML = `
      <div style="display:inline-block;max-width:70%;padding:10px 14px;border-radius:12px;font-size:14px;
        background:${isMe ? '#6c63ff' : '#f0eeff'};
        color:${isMe ? 'white' : '#1a1a2e'};
        border-bottom-${isMe ? 'right' : 'left'}-radius:2px">
        ${data.message}
      </div>
      <div style="font-size:11px;color:#aaa;margin-top:3px">${data.sent_at}</div>`;
    box.insertBefore(div, document.getElementById('chat-end'));
    document.getElementById('chat-end').scrollIntoView();
  });

  function sendMessage() {
    const input = document.getElementById('msg-input');
    const msg = input.value.trim();
    if (!msg) return;
    socket.emit('send_message', {room: room, message: msg, sender: sender});
    input.value = '';
  }

  document.getElementById('chat-end').scrollIntoView();
</script>
{% endblock %}
